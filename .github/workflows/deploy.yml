name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CONTAINER_REGISTRY: yourregistry.azurecr.io
      RESOURCE_GROUP: your-resource-group
      CONTAINER_APP_NAME_FRONTEND: tankmates-frontend
      CONTAINER_APP_NAME_BACKEND: tankmates-backend
      AZURE_SUBSCRIPTION: your-subscription-id
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to ACR
      run: az acr login --name yourregistry

    - name: Build and push frontend
      run: |
        docker build -t $AZURE_CONTAINER_REGISTRY/frontend:latest ./frontend
        docker push $AZURE_CONTAINER_REGISTRY/frontend:latest

    - name: Build and push backend
      run: |
        docker build -t $AZURE_CONTAINER_REGISTRY/backend:latest ./backend
        docker push $AZURE_CONTAINER_REGISTRY/backend:latest

    - name: Deploy to Azure Container Apps
      run: |
        az containerapp update --name $CONTAINER_APP_NAME_FRONTEND \
          --resource-group $RESOURCE_GROUP \
          --image $AZURE_CONTAINER_REGISTRY/frontend:latest

        az containerapp update --name $CONTAINER_APP_NAME_BACKEND \
          --resource-group $RESOURCE_GROUP \
          --image $AZURE_CONTAINER_REGISTRY/backend:latest

    - name: Run Prisma DB Seed
      run: |
        docker run --rm -e DATABASE_URL=$DATABASE_URL $AZURE_CONTAINER_REGISTRY/backend:latest npm run seed
